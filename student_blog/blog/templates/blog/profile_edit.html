{% extends 'blog/base.html' %}

{% block title %}Edit Profile — Inkwell{% endblock %}

{% block content %}

<div class="max-w-lg mx-auto px-6 py-10">

    <div class="mb-8">
        <h1 class="text-3xl text-slate-800 mb-1">Edit Profile</h1>
        <p class="text-slate-500 text-sm">Update your bio and profile picture</p>
    </div>

    <div class="bg-white border border-slate-200 rounded-2xl p-8">

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- profile picture -->
            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">
                    Profile Picture
                </label>
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-indigo-400 hover:bg-indigo-50/30 transition-all cursor-pointer"
                     onclick="document.getElementById('picture-input').click()">
                    <div class="text-3xl mb-2">🖼️</div>
                    <p class="text-sm text-slate-400">
                        Drop an image here or
                        <span class="text-indigo-500 font-semibold">browse</span>
                    </p>
                    <p class="text-xs text-slate-300 mt-1">PNG, JPG up to 5MB</p>
                    <p class="text-xs text-indigo-500 mt-2 hidden" id="file-name"></p>
                </div>
                <input
                    type="file"
                    name="profile_picture"
                    id="picture-input"
                    accept="image/*"
                    class="hidden"
                    onchange="showFileName(this)">
            </div>

            <!-- bio -->
            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">
                    Bio
                </label>
                <textarea
                    name="bio"
                    rows="4"
                    placeholder="Tell readers a little about yourself..."
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all resize-none">{{ form.bio.value|default:'' }}</textarea>
            </div>

            <!-- actions -->
            <div class="flex items-center gap-3">
                <a href="{% url 'profile' request.user.username %}"
                   class="px-5 py-2.5 rounded-xl border border-slate-200 bg-white text-sm text-slate-500 hover:border-slate-300 hover:text-slate-700 transition-all">
                    Cancel
                </a>
                <button
                    type="submit"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white py-2.5 rounded-xl text-sm font-semibold transition-all">
                    Save changes
                </button>
            </div>

        </form>

    </div>
</div>

<script>
    function showFileName(input) {
        const label = document.getElementById('file-name');
        if (input.files && input.files[0]) {
            label.textContent = input.files[0].name;
            label.classList.remove('hidden');
        }
    }
</script>

{% endblock %}
